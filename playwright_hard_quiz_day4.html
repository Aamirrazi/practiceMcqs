<script>
  const Q = [
    [
      {
        q: "What is the OUTPUT of this code when the page has exactly 3 list items with texts: 'Apple', 'Banana', 'Cherry'?",
        code: `const items = page.getByRole('listitem');
const count = await items.count();
const texts = await items.allTextContents();
console.log(count, texts[count - 1]);`,
        opts: [
          "3  'Cherry'",
          "3  'Banana'",
          "3  undefined",
          "It throws — allTextContents() cannot be called after count()",
        ],
        ans: 0,
        exp: "count() returns 3. texts is ['Apple','Banana','Cherry']. texts[count-1] = texts[2] = 'Cherry'. Both count() and allTextContents() are valid independent calls on the same locator — they don't interfere with each other.",
      },

      {
        q: "This code aims to select the 2nd radio button in a group. What is actually selected?",
        code: `await page.locator('input[type="radio"]').nth(1).check();`,
        opts: [
          "The 2nd radio button — nth(1) is index 1 which is the 2nd element",
          "The 1st radio button — nth(1) is 1-based so it maps to the first element",
          "The 3rd radio button — nth counts from the end when index is odd",
          "It throws — check() is not valid on radio buttons, only checkboxes",
        ],
        ans: 0,
        exp: "nth() in Playwright is 0-indexed. nth(0) = 1st, nth(1) = 2nd, nth(2) = 3rd. So nth(1) correctly selects the 2nd radio button. check() works on both checkboxes AND radio buttons. The confusion often comes from XPath which is 1-indexed.",
      },

      {
        q: "Which of these locator chains will FAIL at runtime even though it looks valid?",
        code: null,
        opts: [
          `page.getByRole('row',{name:'John'}).getByRole('button',{name:'Edit'})`,
          `page.locator('table').locator('tr').filter({hasText:'John'}).locator('button')`,
          `page.getByRole('button',{name:'Edit'}).locator('..').getByRole('row')`,
          `page.locator('tr:has-text("John") button:has-text("Edit")')`,
        ],
        ans: 2,
        exp: "Option C tries to use '..' (parent selector) inside .locator() — Playwright does NOT support CSS parent traversal via '..'. You cannot go UP the DOM using locator(). To scope a search, always go DOWN from a parent. Options A, B, D are all valid approaches.",
      },

      {
        q: "What does this assertion actually verify — and what does it NOT verify?",
        code: `await expect(page.getByTestId('price')).toHaveText('$29.99');`,
        opts: [
          "Verifies the element's value attribute equals '$29.99' — does NOT check visible text",
          "Verifies the full visible text content equals '$29.99' — does NOT check partial matches",
          "Verifies the innerHTML contains '$29.99' including child tags",
          "Verifies the placeholder attribute equals '$29.99' — not the displayed value",
        ],
        ans: 1,
        exp: "toHaveText() checks the FULL visible text content of the element and auto-retries. By default it does an exact match on normalized text. It does NOT check value attributes (that's toHaveValue), placeholder, or innerHTML structure. If the element shows '$29.99 USD', this assertion would FAIL.",
      },

      {
        q: "What happens when this code runs and the button becomes visible after 8 seconds?",
        code: `// playwright.config.ts: use: { actionTimeout: 5000 }
await page.getByRole('button', { name: 'Submit' }).click({ timeout: 12000 });`,
        opts: [
          "Throws after 5 seconds — config actionTimeout always takes precedence over inline timeout",
          "Throws after 12 seconds — inline timeout overrides the global actionTimeout for this action",
          "Throws after 8.5 seconds — Playwright averages the two timeout values",
          "Clicks successfully after 8 seconds — Playwright always waits as long as needed",
        ],
        ans: 1,
        exp: "Per-action timeout { timeout: 12000 } overrides the global actionTimeout for that specific call. The config's actionTimeout is just the default when no inline timeout is provided. Here, the button appears at 8s which is within the 12s window, so it clicks successfully.",
      },

      {
        q: "A locator is defined as shown. On which line does Playwright actually query the DOM?",
        code: `const btn = page.getByRole('button', { name: 'Login' }); // Line 1
const isVis = await btn.isVisible();                         // Line 2
await btn.click();                                           // Line 3`,
        opts: [
          "Line 1 — getByRole() immediately queries the DOM to find the element",
          "Line 2 — isVisible() triggers the first DOM query",
          "Lines 2 and 3 independently — each action queries the DOM fresh at the time of call",
          "Line 3 only — Playwright batches all queries and executes at the first action",
        ],
        ans: 2,
        exp: "Playwright Locators are LAZY — Line 1 just creates a descriptor, no DOM query happens. Every time an action or assertion is called (isVisible on Line 2, click on Line 3), Playwright queries the DOM freshly at that moment. This is why locators are resilient to DOM re-renders between calls.",
      },

      {
        q: "What is the exact difference between these two assertions?",
        code: `// Assertion A
await expect(page.getByRole('heading')).toHaveText('Welcome');
// Assertion B
await expect(page.getByRole('heading')).toContainText('Welcome');`,
        opts: [
          "They are identical — toHaveText and toContainText both do partial matching",
          "A fails if heading text is 'Welcome, John!' — B passes because it checks for substring",
          "A passes for any heading containing 'Welcome' — B requires an exact full-string match",
          "A checks the value attribute — B checks the visible text content",
        ],
        ans: 1,
        exp: "toHaveText() matches the FULL normalized text — 'Welcome, John!' would FAIL option A. toContainText() checks for a SUBSTRING — 'Welcome, John!' would PASS option B. This is a critical distinction when asserting on dynamic text that includes usernames, dates, or counts.",
      },

      {
        q: "This test uses a custom fixture. What will the console print for a PASSING test?",
        code: `export const test = base.extend({
  myPage: async ({ page }, use) => {
    console.log('A');
    await page.goto('/home');
    await use(page);
    console.log('B');
  }
});
test('check title', async ({ myPage }) => {
  console.log('C');
  await expect(myPage).toHaveTitle(/Home/);
});`,
        opts: [
          "A → C → B",
          "C → A → B",
          "A → B → C",
          "A → C  (B never runs for passing tests)",
        ],
        ans: 0,
        exp: "Custom fixture execution: setup code runs first (A), then use() yields to the test body (C), then after the test completes the code after use() runs as teardown (B). This is guaranteed regardless of pass/fail status — teardown ALWAYS runs after use(), which is why it's safe for cleanup.",
      },

      {
        q: "Which of these will correctly read ALL option values from a native <select> dropdown?",
        code: `// HTML: <select id='lang'><option value='js'>JS</option><option value='ts'>TS</option></select>`,
        opts: [
          `await page.locator('#lang option').allTextContents()`,
          `await page.getByRole('option').evaluateAll(els => els.map(e => e.value))`,
          `await page.locator('select#lang').inputValue()`,
          `await page.locator('#lang').selectOption()`,
        ],
        ans: 1,
        exp: "evaluateAll() runs JS in the browser on ALL matched elements — perfect for extracting properties like .value from every option. Option A gets text contents (not values). Option C gets only the currently SELECTED value (single string). Option D with empty selectOption() throws an error.",
      },

      {
        q: "What is the ACTUAL behavior of this code during a test retry?",
        code: `test('flaky test', async ({ page }) => {
  if (test.info().retry > 0) {
    await page.context().clearCookies();
  }
  await page.goto('/dashboard');
});`,
        opts: [
          "clearCookies() runs on the 1st attempt and every retry",
          "clearCookies() runs only from the 2nd attempt onward — retry 0 means first run",
          "test.info().retry is always 0 — retries reset the counter each time",
          "This throws — clearCookies() is not a valid method on BrowserContext",
        ],
        ans: 1,
        exp: "test.info().retry starts at 0 on the FIRST run. On the 1st retry it becomes 1, 2nd retry becomes 2, etc. So retry > 0 is false on the first attempt and true only on actual retries. This pattern lets you do extra cleanup (like clearing cookies) only when a test is being retried — not on the first run.",
      },
    ],
    [
      {
        q: "A test runs across 3 browser projects (chromium, firefox, webkit) with workers:4 and fullyParallel:true. How many total worker processes can be running simultaneously at peak?",
        code: null,
        opts: [
          "3 — one per browser project regardless of workers setting",
          "4 — workers:4 is the hard ceiling across all projects combined",
          "12 — 4 workers per project × 3 projects",
          "Up to 4 — workers caps the concurrency, tests from all 3 projects compete for these 4 slots",
        ],
        ans: 3,
        exp: "workers:4 sets the GLOBAL maximum concurrent worker processes. Tests from all projects (chromium, firefox, webkit) compete for these 4 slots. At peak you have 4 tests running simultaneously — they could be a mix of any browsers. Workers is not multiplied per project.",
      },

      {
        q: "What is WRONG with this beforeAll that tries to share an authenticated page across tests?",
        code: `test.describe('Suite', () => {
  let page: Page;
  test.beforeAll(async ({ browser }) => {
    const ctx = await browser.newContext();
    page = await ctx.newPage();
    await page.goto('/login');
    await page.fill('#email','admin@x.com');
    await page.click('#submit');
  });
  test('T1', async () => { await page.goto('/users'); });
  test('T2', async () => { await page.goto('/reports'); });
});`,
        opts: [
          "browser fixture is not available in beforeAll — use page fixture instead",
          "The context created in beforeAll is never closed — it leaks between test runs",
          "page.fill() requires the element to be awaited before calling fill()",
          "Tests T1 and T2 must use the { page } fixture parameter, not the outer page variable",
        ],
        ans: 1,
        exp: "The BrowserContext created manually in beforeAll is NEVER closed — there's no afterAll calling ctx.close(). This leaks memory and can cause flaky behavior in long test runs. Always pair new context creation with explicit cleanup in afterAll. The outer page variable pattern itself is valid when used with browser fixture.",
      },

      {
        q: "Three locators target the same button. In which ORDER does Playwright recommend using them (most preferred first)?",
        code: `// Button HTML: <button data-testid="pay-btn" aria-label="Pay Now">Pay Now</button>`,
        opts: [
          "getByTestId → getByRole → getByText",
          "getByRole → getByText → getByTestId",
          "getByRole → getByTestId → getByText",
          "getByText → getByRole → getByTestId",
        ],
        ans: 2,
        exp: "Playwright's official priority: getByRole (semantic/accessible) > getByLabel > getByPlaceholder > getByText > getByTestId > CSS > XPath. getByRole is FIRST because it validates accessibility. getByTestId is stable but lower priority than semantic selectors. getByText is fragile when text changes.",
      },

      {
        q: "What is the subtle execution order issue in this code?",
        code: `test('download and verify', async ({ page }) => {
  await page.goto('/reports');
  const download = await page.waitForEvent('download');
  await page.getByRole('button', { name: 'Export' }).click();
  await download.saveAs('./output/report.csv');
});`,
        opts: [
          "saveAs() must be called before waitForEvent to pre-configure the save path",
          "waitForEvent('download') is awaited BEFORE the click — it will wait forever since nothing triggered the download yet",
          "page.waitForEvent returns a Promise — it should not be awaited directly",
          "download.saveAs() must specify contentType like in testInfo.attach()",
        ],
        ans: 1,
        exp: "This is the classic race condition trap. await page.waitForEvent('download') BLOCKS execution until a download event fires. But the click that TRIGGERS the download comes after — so the code hangs forever waiting for an event that hasn't been triggered. Fix: use Promise.all([page.waitForEvent('download'), page.click(...)]) so both start simultaneously.",
      },

      {
        q: "What does this configuration actually do — and what is the hidden risk?",
        code: `export default defineConfig({
  use: { baseURL: 'https://staging.example.com' },
  projects: [
    { name: 'prod', use: { baseURL: 'https://example.com' } },
    { name: 'staging' },
  ]
});`,
        opts: [
          "Both projects use their own baseURL — 'staging' project has no baseURL so page.goto('/') fails",
          "The 'prod' project overrides the global baseURL; 'staging' inherits the global baseURL — both work",
          "Project-level use{} merges with global use{} — 'prod' gets both baseURLs which causes conflict",
          "This config is invalid — baseURL must be set at project level, not in global use{}",
        ],
        ans: 1,
        exp: "Project-level use{} OVERRIDES global use{} for that project. 'prod' uses its own baseURL. 'staging' has no use{} override so it INHERITS the global baseURL 'https://staging.example.com'. The risk: forgetting to set a project-level baseURL silently uses the global one, potentially running 'prod' tests against staging.",
      },

      {
        q: "A developer uses expect.soft() for 8 assertions then a hard assertion. The 3rd and 6th soft assertions fail. What is reported?",
        code: `test('form validation', async ({ page }) => {
  await expect.soft(page.getByTestId('f1')).toBeVisible(); // passes
  await expect.soft(page.getByTestId('f2')).toBeVisible(); // passes
  await expect.soft(page.getByTestId('f3')).toBeVisible(); // FAILS
  await expect.soft(page.getByTestId('f4')).toBeVisible(); // passes
  await expect.soft(page.getByTestId('f5')).toBeVisible(); // passes
  await expect.soft(page.getByTestId('f6')).toBeVisible(); // FAILS
  await expect.soft(page.getByTestId('f7')).toBeVisible(); // passes
  await expect.soft(page.getByTestId('f8')).toBeVisible(); // passes
  await expect(page).toHaveURL('/form');                   // passes
});`,
        opts: [
          "Test PASSES — soft failures are warnings only and don't affect test result",
          "Test FAILS — reports only the 3rd failure (first failure stops soft collection)",
          "Test FAILS — reports both the 3rd and 6th failures together at end of test",
          "Test FAILS — reports only the 6th failure (last failure wins)",
        ],
        ans: 2,
        exp: "Soft assertions NEVER stop the test — all 8 run regardless of failures. At the END of the test, if any soft assertion failed, the test is marked FAILED and ALL soft failures are reported together. The hard assertion also runs and passes. The final test status: FAILED, showing both the 3rd and 6th failures in the report.",
      },

      {
        q: "What is the key difference between these two waiting strategies?",
        code: `// Strategy A
await page.waitForLoadState('networkidle');

// Strategy B
await page.waitForResponse('**/api/dashboard/data');`,
        opts: [
          "A waits for all network to stop for 500ms — may wait too long or too short; B waits for a specific response — precise but only works for known endpoints",
          "A and B are equivalent — both wait until the API completes loading",
          "A is deprecated in Playwright v1.30+; B is the recommended replacement",
          "B waits for the request to be sent; A waits for the response to be received",
        ],
        ans: 0,
        exp: "networkidle waits until there are no network requests for 500ms — this is IMPRECISE: it can timeout on sites with polling, or pass too early on slow networks. waitForResponse targets a SPECIFIC API response — far more reliable for SPAs. networkidle is useful for static pages; waitForResponse is better for data-driven pages.",
      },

      {
        q: "What is wrong with this custom fixture definition?",
        code: `export const test = base.extend<{ authPage: Page }>({
  authPage: async ({ page }, use) => {
    await page.goto('/login');
    await page.fill('#email', 'user@test.com');
    await page.click('#submit');
    await page.waitForURL('/dashboard');
    use(page);
  },
});`,
        opts: [
          "The generic type <{ authPage: Page }> should be <{ authPage: Page; }> with semicolon",
          "use(page) is not awaited — the fixture teardown will not execute and the page may close prematurely",
          "page.fill() should use getByLabel() to follow best practices inside fixtures",
          "Fixtures cannot call page.goto() — navigation must happen inside the test body",
        ],
        ans: 1,
        exp: "use() MUST be awaited: await use(page). Without await, the async generator doesn't suspend — Playwright immediately runs teardown code and may close the page before the test body finishes. This causes intermittent 'page closed' errors. Always await use() in custom fixtures — it's what pauses execution during the test.",
      },

      {
        q: "This test passes locally with 1 worker but fails with workers:4. What is the root cause?",
        code: `test.describe('Cart Tests', () => {
  test.beforeAll(async ({ request }) => {
    await request.post('/api/seed', { data: { cartId: 'test-cart-1' } });
  });
  test('add item', async ({ page }) => {
    await page.goto('/cart/test-cart-1');
    await page.getByRole('button', { name: 'Add' }).click();
    await expect(page.getByTestId('item-count')).toHaveText('1');
  });
  test('remove item', async ({ request }) => {
    await request.delete('/api/cart/test-cart-1/items/all');
    await expect(...);
  });
});`,
        opts: [
          "request fixture cannot be used in beforeAll — it is only available in test bodies",
          "With workers:4 tests from other describe blocks may modify test-cart-1 simultaneously — shared test data causes race conditions",
          "beforeAll only runs once but with parallel workers it may run multiple times",
          "page.goto() with a hardcoded cartId is not compatible with parallel execution",
        ],
        ans: 1,
        exp: "The hard-coded shared resource 'test-cart-1' is the problem. With workers:4, tests from different files may run simultaneously and all hit the same cart. One worker's 'add item' test may run while another worker's 'remove item' test is cleaning up — causing unpredictable state. Fix: generate unique IDs per test run using Date.now() or uuid.",
      },

      {

  let lvl = 0,
    qi = 0,
    scores = [0, 0, 0],
    ans_map = [[], [], []];
  function switchLevel(l) {
    lvl = l;
    qi = 0;
    document
      .querySelectorAll(".tab")
      .forEach((t, i) => t.classList.toggle("active", i === l));
    render();
  }
  function render() {
    const qs = Q[lvl],
      q = qs[qi],
      tot = qs.length;
    document.getElementById("prog").style.width = (qi / tot) * 100 + "%";
    document.getElementById("qnum").textContent =
      `Question ${qi + 1} of ${tot}`;
    document.getElementById("sbadge").textContent = `Score: ${scores[lvl]}`;
    const prev = ans_map[lvl][qi],
      done = prev !== undefined;
    const bl = ["b1", "b2", "b3"],
      ll = ["Code Analysis", "Deep Concepts", "Scenario Traps"];
    let h = `<div class="qcard"><span class="lvlbadge ${bl[lvl]}">${ll[lvl]}</span><p class="qtext">${q.q}</p>`;
    if (q.code) h += `<div class="codeblock">${esc(q.code)}</div>`;
    h += `<div class="opts">`;
    ["A", "B", "C", "D"].forEach((k, i) => {
      let c = "opt";
      if (done) {
        c += " locked";
        if (i === q.ans) c += " correct";
        else if (i === prev && prev !== q.ans) c += " wrong";
      }
      h += `<button class="${c}" onclick="pick(${i})"><span class="okey">${k}</span><span class="otext">${esc(q.opts[i])}</span></button>`;
    });
    h += `</div>`;
    if (done) h += `<div class="explain"><strong>Why:</strong> ${q.exp}</div>`;
    h += `</div><div class="navrow"><button class="btn" onclick="go(-1)" ${qi === 0 ? "disabled" : ""}>← Prev</button><span style="font-size:12px;color:var(--color-text-secondary)">${qi + 1}/${tot}</span>${qi < tot - 1 ? `<button class="btn btnp" onclick="go(1)">Next →</button>` : `<button class="btn btnp" onclick="finish()">Finish ✓</button>`}</div>`;
    document.getElementById("area").innerHTML = h;
  }
  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function pick(i) {
    if (ans_map[lvl][qi] !== undefined) return;
    ans_map[lvl][qi] = i;
    if (i === Q[lvl][qi].ans) scores[lvl]++;
    render();
  }
  function go(d) {
    const t = qi + d;
    if (t >= 0 && t < Q[lvl].length) {
      qi = t;
      render();
    }
  }
  function finish() {
    const tot = Q[lvl].length,
      s = scores[lvl],
      pct = Math.round((s / tot) * 100);
    const msg =
      pct < 40
        ? "These are genuinely hard — every wrong answer is a lesson 📖"
        : pct < 60
          ? "Solid effort on expert-level questions 💡"
          : pct < 80
            ? "You think like a senior QA engineer 🎯"
            : "Exceptional — you are exam-ready 🏆";
    document.getElementById("area").innerHTML =
      `<div class="result"><p style="font-size:13px;color:var(--color-text-secondary)">Level ${lvl + 1} — Expert Edition</p><div class="rscore">${s}/${tot}</div><p style="font-size:13px;color:var(--color-text-secondary)">Accuracy: ${pct}%</p><p style="font-size:14px;color:var(--color-text-primary);margin:.75rem 0">${msg}</p><div class="stats"><div class="stat"><div class="snum">${s}</div><div class="slbl">Correct</div></div><div class="stat"><div class="snum">${tot - s}</div><div class="slbl">Wrong</div></div><div class="stat"><div class="snum">${pct}%</div><div class="slbl">Score</div></div></div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn" onclick="retry()">↺ Retry</button>${lvl < 2 ? `<button class="btn btnp" onclick="switchLevel(${lvl + 1})">Next Level →</button>` : `<button class="btn btnp" onclick="sendPrompt('Day 4 expert quiz done. L1:'+scores[0]+'/10 L2:'+scores[1]+'/10 L3:'+scores[2]+'/10. Analyze my weak areas in detail.')">Get Analysis ↗</button>`}</div></div><div class="navrow" style="margin-top:1rem"><button class="btn" onclick="go(-1)">← Review</button><span></span></div>`;
  }
  function retry() {
    ans_map[lvl] = [];
    scores[lvl] = 0;
    qi = 0;
    render();
  }
  render();
</script>
